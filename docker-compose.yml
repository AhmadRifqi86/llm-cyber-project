# =============================================================================
# Automated Penetration Testing Framework – docker-compose
#
# Quick-start (local llama.cpp, default):
#   docker compose run --rm pentest example.com
#
# Custom llama.cpp URL or Ollama:
#   LLM_BASE_URL=http://localhost:11434/v1 LLM_MODEL=llama3.2 \
#     docker compose run --rm pentest example.com
#
# OpenAI:
#   LLM_PROVIDER=openai OPENAI_API_KEY=sk-... \
#     docker compose run --rm pentest example.com
#
# Skip exploit phase:
#   docker compose run --rm pentest example.com --skip-exploit
#
# Skip LLM (tools only):
#   docker compose run --rm pentest example.com --skip-llm
#
# Interactive shell:
#   docker compose run --rm --entrypoint bash pentest
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Main penetration testing service
  # ---------------------------------------------------------------------------
  pentest:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SUBFINDER_VERSION: "2.6.6"
        GOBUSTER_VERSION: "3.6.0"
    image: cyberpentest:latest

    environment:
      # Local LLM provider (default). Point at your llama.cpp / Ollama / LM Studio server.
      - LLM_PROVIDER=${LLM_PROVIDER:-local}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://llm.pcremote.my.id/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen3.5-9b}
      # Only required when LLM_PROVIDER=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

    # Persist scan results and FAISS index on the host
    volumes:
      - ./output:/app/output
      - ./data:/app/data

    # Allow raw socket operations needed by nmap
    cap_add:
      - NET_ADMIN
      - NET_RAW

    # Use host networking so nmap/wafw00f reach external targets directly.
    # NOTE: network_mode: host only works on Linux Docker — remove this line
    # on macOS or Windows Docker Desktop (bridge networking is used instead).
    network_mode: host

    # Prevent runaway scans from locking the container
    stop_grace_period: 30s

    # Resource limits (adjust to your hardware)
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G

  # ---------------------------------------------------------------------------
  # Optional: build only (useful for CI pre-building the image)
  # ---------------------------------------------------------------------------
  build-only:
    build:
      context: .
      dockerfile: Dockerfile
    image: cyberpentest:latest
    profiles:
      - build
    entrypoint: ["echo", "Image built successfully."]
